<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Finanziario - Educazione Finanziaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-wrapper">
        <h1>Pac-Man Finanziario</h1>
        
        <div id="financial-ui">
            <div class="ui-box">Conto Corrente: <span id="balance">500</span>€</div>
            <div class="ui-box">Livello: <span id="current-level">1</span>/3</div>
            <div class="ui-box">Stato: <span id="status">Stabile</span></div>
        </div>

        <canvas id="gameCanvas" width="450" height="450"></canvas>
        
        <div id="instructions">
            <p>⌨️ Usa le frecce direzionali per muoverti</p>
            <p><span style="color: yellow;">●</span> Soldi (+10€) | <span style="color: #00ff00; font-size: 1.2em;">🔶</span> Investimenti (Superpotere) | <span style="color: #ff3333;">🍒</span> Bollette (Evitale o vai in Bancarotta!)</p>
        </div>
    </div>

<script src="maps.js"></script>

    <script src="audio.js"></script>

    <script src="sprites.js"></script>

    <script src="player.js"></script>

    <script src="engine.js"></script>
</body>
</html>
